version: '3'

vars:
  MODULE: github.com/hmsoft0815/mlcartifact
  SERVER_BIN: ./bin/artifact-server
  CLI_BIN: ./bin/artifact-cli
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list
    silent: true

  build:
    desc: Build all binaries (server + cli)
    cmds:
      - task: build-server
      - task: build-cli

  build-server:
    desc: Build the artifact-server binary
    cmds:
      - mkdir -p ./bin
      - go build -ldflags "-X main.version={{.VERSION}}" -o {{.SERVER_BIN}} ./cmd/server
    sources:
      - cmd/server/**/*.go
      - "*.go"
      - proto/**/*.go
    generates:
      - "{{.SERVER_BIN}}"

  build-cli:
    desc: Build the artifact-cli binary
    cmds:
      - mkdir -p ./bin
      - go build -ldflags "-X main.version={{.VERSION}}" -o {{.CLI_BIN}} ./cmd/cli/cmd/artifact-cli
    sources:
      - cmd/cli/**/*.go
    generates:
      - "{{.CLI_BIN}}"

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test-verbose:
    desc: Run all tests with verbose output
    cmds:
      - go test -v ./...

  test-cover:
    desc: Run tests with coverage report
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report written to coverage.html"

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  tidy:
    desc: Tidy go.mod
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf ./bin coverage.out coverage.html
      - rm -rf ./client-ts/dist ./client-ts/src/gen

  run-server:
    desc: Run artifact-server in stdio mode (for development)
    cmds:
      - go run ./cmd/server

  run-server-sse:
    desc: Run artifact-server in SSE mode on :8082
    cmds:
      - go run ./cmd/server -addr :8082 -grpc-addr :9590

  proto:
    desc: Regenerate protobuf files (requires protoc + gen plugins)
    cmds:
      - task: proto-go
      - task: proto-ts
      - task: proto-python

  proto-go:
    desc: Regenerate Go protobuf files
    dir: proto
    cmds:
      - protoc --go_out=. --go_opt=paths=source_relative
          --go-grpc_out=. --go-grpc_opt=paths=source_relative
          --connect-go_out=. --connect-go_opt=paths=source_relative
          artifact.proto

  proto-python:
    desc: Regenerate Python protobuf files
    cmds:
      - mkdir -p client-python/mlcartifact/gen
      - python3 -m grpc_tools.protoc -I proto --python_out=client-python/mlcartifact/gen --grpc_python_out=client-python/mlcartifact/gen proto/artifact.proto
      - touch client-python/mlcartifact/gen/__init__.py

  dist-ts:
    desc: Build the universal TypeScript ES6+ library
    dir: client-ts
    cmds:
      - npm install
      - npm run generate
      - npm run build
