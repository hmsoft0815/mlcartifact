id: "mlcartifact"
name: "mlcartifact"
version: "0.4.3"
status: "stable"
category: "Infrastructure"
license: "MIT"
platforms: [Windows, macOS, Linux]
slogan_en: "Don't route large data through the LLM — let MCP servers exchange artifacts by ID."
slogan_de: "Große Daten nicht durch das LLM leiten — MCP-Server tauschen Artefakte per ID aus."

screenshots:
  - "how_it_works.png"

spotlight_sections:
  - title_en: "The Shared Memory Layer for MCP Ecosystems"
    title_de: "Die gemeinsame Speicherschicht für MCP-Ökosysteme"
    desc_en: "MCP Server A writes a 2 MB CSV to mlcartifact and returns only the artifact ID to the LLM. MCP Server B reads it directly — the large data never flows through the context window."
    desc_de: "MCP-Server A schreibt eine 2-MB-CSV in mlcartifact und gibt dem LLM nur die Artifact-ID zurück. MCP-Server B liest sie direkt — die großen Daten fließen nie durch das Kontextfenster."
    screenshot: "how_it_works.png"
    items_en:
      - "Only IDs flow through the LLM — not the data itself"
      - "Virtual File System with path-based lookup"
      - "Surgical line-based patching for large files"
    items_de:
      - "Nur IDs fließen durch das LLM — nicht die Daten selbst"
      - "Virtuelles Dateisystem mit pfadbasiertem Zugriff"
      - "Chirurgisches zeilenbasiertes Patching für große Dateien"

features:
  - icon: "folder-open"
    title_en: "Virtual File System (VFS)"
    title_de: "Virtuelles Dateisystem"
    desc_en: "Hierarchical path-based storage — /projects/report.md instead of flat blob IDs."
    desc_de: "Hierarchische pfadbasierte Ablage — /projects/report.md statt flacher Blob-IDs."
  - icon: "pencil"
    title_en: "Surgical Patching"
    title_de: "Chirurgisches Patching"
    desc_en: "Line-based partial updates and appending — no expensive re-uploads of large artifacts."
    desc_de: "Zeilenbasierte Teilaktualisierungen und Anhängen — keine teuren Re-Uploads großer Artefakte."
  - icon: "plug"
    title_en: "Multi-Protocol Access"
    title_de: "Multi-Protokoll-Zugriff"
    desc_en: "MCP (stdio + SSE), gRPC/Connect, REST, and a dedicated CLI — one store, every client."
    desc_de: "MCP (stdio + SSE), gRPC/Connect, REST und eine dedizierte CLI — ein Store, jeder Client."
  - icon: "clock"
    title_en: "TTL-based Cleanup"
    title_de: "TTL-basierte Bereinigung"
    desc_en: "Automatic expiry keeps the store lean. Explicit deletion also supported."
    desc_de: "Automatisches Ablaufen hält den Store schlank. Explizites Löschen ebenfalls unterstützt."
  - icon: "layers"
    title_en: "Multi-Language Clients"
    title_de: "Mehrsprachige Clients"
    desc_en: "Official clients for Go, TypeScript, Python, and Rust — drop-in for any MCP server."
    desc_de: "Offizielle Clients für Go, TypeScript, Python und Rust — Drop-in für jeden MCP-Server."
  - icon: "cpu"
    title_en: "Lightweight & Self-Hosted"
    title_de: "Leichtgewichtig & Self-Hosted"
    desc_en: "Single Go binary, Docker-ready, no external dependencies."
    desc_de: "Einzelne Go-Binary, Docker-fertig, keine externen Abhängigkeiten."

downloads:
  free: true
  files:
    - os: "Linux"
      arch: "x64"
      label_en: "Linux (amd64)"
      label_de: "Linux (amd64)"
      file: "https://mlcgo.eu/downloads/mlcartifact/mlcartifact-linux-amd64.tar.gz"
    - os: "Windows"
      arch: "x64"
      label_en: "Windows (amd64)"
      label_de: "Windows (amd64)"
      file: "https://mlcgo.eu/downloads/mlcartifact/mlcartifact-windows-amd64.zip"
    - os: "macOS"
      arch: "Universal"
      label_en: "macOS (Universal)"
      label_de: "macOS (Universal)"
      file: "https://mlcgo.eu/downloads/mlcartifact/mlcartifact-macos-universal.tar.gz"
